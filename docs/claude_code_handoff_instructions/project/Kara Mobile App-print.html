<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Kara — Mobile Design (print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="kara-tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #06060a; font-family: 'Inter', system-ui, sans-serif; color: #F1F0FF; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  * { box-sizing: border-box; }

  .page {
    width: 210mm;
    min-height: 297mm;
    padding: 14mm 14mm 14mm;
    background: #06060a;
    page-break-after: always;
    break-after: page;
    break-inside: avoid;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }

  .page-header {
    width: 100%;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10mm;
    padding-bottom: 4mm;
    border-bottom: 1px solid #1E1E2E;
  }
  .page-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: #F1F0FF; margin: 0; }
  .page-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #A78BFA; letter-spacing: 0.08em; text-transform: uppercase; }
  .page-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #5C5B78; }

  .frame-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .cover {
    background: radial-gradient(circle at 30% 20%, rgba(124,58,237,0.45), transparent 55%),
                radial-gradient(circle at 70% 80%, rgba(167,139,250,0.25), transparent 60%),
                #06060a;
  }
  .cover-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
  }

  /* Design system page is taller — let it grow */
  .ds-page .frame-wrap { align-items: flex-start; }

  @page { size: A4 portrait; margin: 0; }
  @media print {
    html, body { background: #06060a; }
    .page { box-shadow: none; }
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="kara-components.jsx"></script>
<script type="text/babel" src="kara-screen-1.jsx"></script>
<script type="text/babel" src="kara-screen-2.jsx"></script>
<script type="text/babel" src="kara-screen-3.jsx"></script>
<script type="text/babel" src="kara-design-system.jsx"></script>

<div id="root"></div>

<script type="text/babel" data-presets="react">
function PrintFrame({ children }) {
  return (
    <div style={{ transform: 'scale(0.85)', transformOrigin: 'center center' }}>
      <IOSDevice width={390} height={844} dark>
        <div style={{ width: '100%', height: '100%', position: 'relative' }}>
          {children}
        </div>
      </IOSDevice>
    </div>
  );
}

function Page({ num, title, sub, children, className = '' }) {
  return (
    <div className={`page ${className}`}>
      <div className="page-header">
        <div>
          <div className="page-sub">Kara · {sub}</div>
          <h2 className="page-title">{title}</h2>
        </div>
        <div className="page-num">{String(num).padStart(2, '0')} / 17</div>
      </div>
      <div className="frame-wrap">{children}</div>
    </div>
  );
}

const screens = [
  { title: 'Onboarding · 1/3', sub: 'Communauté', el: <KaraOnboarding slide={0} /> },
  { title: 'Onboarding · 2/3', sub: 'Échange', el: <KaraOnboarding slide={1} /> },
  { title: 'Onboarding · 3/3', sub: 'Bientôt', el: <KaraOnboarding slide={2} /> },
  { title: 'Auth', sub: 'Connexion', el: <KaraAuth /> },
  { title: 'Discover · feed', sub: 'Feed scroll-snap', el: <KaraDiscover /> },
  { title: 'Search', sub: 'Exploration', el: <KaraSearch /> },
  { title: 'Post · 1 · Photos', sub: 'Stepper', el: <KaraPost step={0} /> },
  { title: 'Post · 2 · Specs', sub: 'Stepper', el: <KaraPost step={1} /> },
  { title: 'Post · 3 · Description', sub: 'Stepper', el: <KaraPost step={2} /> },
  { title: 'Post · 4 · Localisation', sub: 'Stepper', el: <KaraPost step={3} /> },
  { title: 'Chat · liste', sub: 'Messages', el: <KaraChatList /> },
  { title: 'Conversation', sub: 'Chat', el: <KaraConversation /> },
  { title: 'Profil · mien', sub: 'Profile', el: <KaraProfile isMine /> },
  { title: 'Profil · autre', sub: 'Profile', el: <KaraProfile isMine={false} /> },
  { title: 'Profil véhicule', sub: 'Detail', el: <KaraVehicleDetail /> },
];

function PrintApp() {
  return (
    <>
      {/* Cover */}
      <div className="page cover">
        <div className="cover-content">
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 24 }}>
            <KaraLogoMark size={56} />
            <KaraWordmark size={48} color="#fff" />
          </div>
          <div className="page-sub" style={{ marginBottom: 8 }}>Mobile Design · Avril 2026</div>
          <h1 style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 64, letterSpacing: '-0.03em', lineHeight: 1, margin: 0, color: '#fff' }}>
            Le réseau des<br/>passionnés d'auto.
          </h1>
          <p style={{ marginTop: 24, fontSize: 16, color: 'rgba(241,240,255,0.7)', maxWidth: 440, lineHeight: 1.5 }}>
            Design system + 16 écrans mobile (iPhone 390×844, dark mode). JDM, stance, custom, daily — tout y passe.
          </p>
          <div style={{ marginTop: 36, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <KaraTag>#JDM</KaraTag>
            <KaraTag>#Stance</KaraTag>
            <KaraTag>#Drift</KaraTag>
            <KaraTag>#Custom</KaraTag>
            <KaraTag>#Track</KaraTag>
          </div>
        </div>
        <div style={{ alignSelf: 'flex-end', fontFamily: 'JetBrains Mono', fontSize: 10, color: '#5C5B78' }}>
          00 / 17 · COVER
        </div>
      </div>

      {/* Design system page */}
      <div className="page ds-page">
        <div className="page-header">
          <div>
            <div className="page-sub">Kara · System</div>
            <h2 className="page-title">Design System</h2>
          </div>
          <div className="page-num">01 / 17</div>
        </div>
        <div className="frame-wrap">
          <div style={{ transform: 'scale(0.78)', transformOrigin: 'top center', width: 390, height: 'auto' }}>
            <div style={{ width: 390, background: '#0A0A0F', borderRadius: 18, overflow: 'hidden', border: '1px solid #1E1E2E' }}>
              <KaraDesignSystem />
            </div>
          </div>
        </div>
      </div>

      {/* Screens */}
      {screens.map((s, i) => (
        <Page key={i} num={i + 2} title={s.title} sub={s.sub}>
          <PrintFrame>{s.el}</PrintFrame>
        </Page>
      ))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

// Auto-print after fonts + JSX ready
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  setTimeout(() => { window.print(); }, 1200);
})();
</script>
</body>
</html>
